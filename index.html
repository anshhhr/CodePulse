<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodePulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <div class="mx-auto p-6">
      <h1 class="text-3xl font-bold mb-6 text-center">CodePulse</h1>

      <div class="flex mb-6">
        <img
          class="rounded-full w-20 h-20"
          src="21a06c4dbd317f4d60c1ad55b6cd6488.jpg.jpeg"
          alt="Profile picture"
        />
        <h3 class="text-xl font-semibold mt-2">Ansh Rahangdale</h3>
        <p class="text-gray-500 text-sm">Bio</p>
      </div>

      <div class="flex gap-4 bg-gray-100 p-4">
        <div class="bg-gray-100 p-4 rounded-lg">Repos: 12</div>
        <div class="bg-gray-100 p-4 rounded-lg">Stared: 12</div>
        <div class="bg-gray-100 p-4 rounded-lg">Follower: 12</div>
      </div>
      <div>
        <h3 class="font-bold">Languages</h3>

        <ul>
          <li class="text-gray-600">Javascript</li>
          <li class="text-gray-600">Html</li>
          <li class="text-gray-600">Css</li>
          <li class="text-gray-600">Tailwind</li>
        </ul>
      </div>

      <div class="habit-tracker-section">
        <div class="border border-gray-300 rounded p-2 mr-2">
          <input type="text" placeholder="Type habit name " />
          <button class="bg-blue-500 text-white px-4 py-2 rounded">Add</button>
        </div>

        <table class="w-full mt-4 border-collapse">
          <tr>
            <td>Habit</td>
            <td>Day 1</td>
            <td>Day 2</td>
          </tr>
        </table>

        <div>
          <h3 class="font-semibold text-lg mt-4 mb-2">Achievement</h3>
          <ul>
            <li class="text-gray-600 text-sm">7 days of strek</li>
            <li class="text-gray-600 text-sm">Completed 3 days</li>
            <li class="text-gray-600 text-sm">No fap for 15 days</li>
          </ul>
        </div>
      </div>
    </div>
  </body>
</html>
